name: EcomDash2 Backfill

on:
  workflow_dispatch:
    inputs:
      from:
        description: 'Start date (YYYY-MM-DD)'
        required: true
      to:
        description: 'End date (YYYY-MM-DD)'
        required: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backfill
        run: npm run jobs:backfill -- --from=${{ github.event.inputs.from }} --to=${{ github.event.inputs.to }}
        env:
          ECOMDASH2_BACKEND_SOURCE: turso
          ECOMDASH2_TURSO_URL: ${{ secrets.ECOMDASH2_TURSO_URL }}
          ECOMDASH2_TURSO_AUTH_TOKEN: ${{ secrets.ECOMDASH2_TURSO_AUTH_TOKEN }}
          ECOMDASH2_DEFAULT_WORKSPACE_ID: ${{ secrets.ECOMDASH2_DEFAULT_WORKSPACE_ID }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
