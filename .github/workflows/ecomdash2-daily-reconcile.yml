name: EcomDash2 Daily Reconcile

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  daily-reconcile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily reconcile
        run: npm run jobs:reconcile
        env:
          ECOMDASH2_BACKEND_SOURCE: turso
          ECOMDASH2_TURSO_URL: ${{ secrets.ECOMDASH2_TURSO_URL }}
          ECOMDASH2_TURSO_AUTH_TOKEN: ${{ secrets.ECOMDASH2_TURSO_AUTH_TOKEN }}
          ECOMDASH2_DEFAULT_WORKSPACE_ID: ${{ secrets.ECOMDASH2_DEFAULT_WORKSPACE_ID }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
