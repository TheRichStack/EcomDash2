name: EcomDash2 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Agent guardrails verify
        run: npm run agent:verify

      - name: Agent context verify
        run: npm run agent:context:verify

      - name: Build
        run: npm run build
        env:
          ECOMDASH2_BACKEND_SOURCE: turso
          ECOMDASH2_TURSO_URL: ${{ secrets.ECOMDASH2_TURSO_URL }}
          ECOMDASH2_TURSO_AUTH_TOKEN: ${{ secrets.ECOMDASH2_TURSO_AUTH_TOKEN }}
          ECOMDASH2_DEFAULT_WORKSPACE_ID: ${{ secrets.ECOMDASH2_DEFAULT_WORKSPACE_ID }}
